<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — DT-STENO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f8;--surface:#fff;--line:#e2e6f0;--accent:#2e5de6;--text:#0e1220;--text2:#374151;--text3:#6b7280;--fail:#dc2626;--gold:#f0a500}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:50px;height:50px;border-radius:12px;background:#0a0e1e;display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:500;color:var(--gold);margin-bottom:12px}
.logo-name{display:block;font-family:'DM Serif Display',serif;font-size:22px;color:var(--text)}
.logo-sub{display:block;font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:3px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.card-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--text3);margin-bottom:22px}
.form-label{display:block;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.input-wrap{position:relative;margin-bottom:16px}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);display:flex}
.input-icon svg{width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:1.8}
.inp{width:100%;padding:11px 14px 11px 38px;background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,93,230,.08)}
.btn{width:100%;padding:12px;border-radius:9px;border:none;cursor:pointer;background:var(--accent);color:#fff;font-size:14px;font-weight:600;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:#1a3db8;transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:14px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);color:var(--fail)}
.alert svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.back{text-align:center;margin-top:16px;font-size:13px;color:var(--text3)}
.back a{color:var(--accent);text-decoration:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">DT</div>
    <span class="logo-name">DT-STENO Admin</span>
    <span class="logo-sub">Instructor Panel</span>
  </div>
  <div class="card">
    <div class="card-title">Admin Sign In</div>
    <div class="card-sub">Enter your admin password to continue</div>
    {% if error %}<div class="alert"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>{{ error }}</div>{% endif %}
    <div class="alert" id="errBox" style="display:none">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
      <span id="errMsg">Incorrect password</span>
    </div>
    <form id="adminForm">
      <label class="form-label">Admin Password</label>
      <div class="input-wrap">
        <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input class="inp" type="password" id="password" placeholder="Admin password" required autofocus>
      </div>
      <button class="btn" type="submit" id="submitBtn"><span id="btnLabel">Sign In to Admin</span></button>
    </form>
  </div>
  <div class="back"><a href="/login">← Student login</a></div>
</div>
<script>
document.getElementById('adminForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('submitBtn');const lbl=document.getElementById('btnLabel');
  const err=document.getElementById('errBox');err.style.display='none';
  btn.disabled=true;lbl.innerHTML='<div class="spinner"></div>';
  try{
    const r=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:document.getElementById('password').value})});
    const d=await r.json();
    if(d.status==='ok'){window.location.href=d.redirect||'/admin/dashboard';}
    else{document.getElementById('errMsg').textContent=d.message||'Incorrect password';err.style.display='flex';btn.disabled=false;lbl.textContent='Sign In to Admin';}
  }catch{document.getElementById('errMsg').textContent='Connection error';err.style.display='flex';btn.disabled=false;lbl.textContent='Sign In to Admin';}
});
</script>
</body>
</html>
