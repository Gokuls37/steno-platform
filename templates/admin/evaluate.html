{% extends "admin/base.html" %}
{% block title %}Evaluate Text{% endblock %}
{% block topbar_title %}Evaluate Text{% endblock %}
{% block content %}
<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
  <div>
    <div class="card mb-3">
      <div class="card-header"><div class="card-title">Step 1 — Select Passage</div></div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">Passage Code</label>
          <input class="form-control" id="eval_code" placeholder="e.g. KC001" style="text-transform:uppercase;font-family:'JetBrains Mono',monospace">
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Step 2 — Paste Typed Text</div></div>
      <div class="card-body">
        <textarea class="form-control" id="eval_text" rows="12" placeholder="Paste the student's transcription here…" style="font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.8"></textarea>
        <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="runEval()">Evaluate →</button>
      </div>
    </div>
  </div>
  <div id="evalResult" style="display:none">
    <div class="card mb-3">
      <div class="card-header"><div class="card-title">Results</div></div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px" id="scoreGrid"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Annotated Passage</div></div>
      <div class="card-body">
        <div id="evalHighlight" style="font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:2.1"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function runEval(){
  const code=document.getElementById('eval_code').value.trim().toUpperCase();
  const text=document.getElementById('eval_text').value.trim();
  if(!code||!text){showToast('Enter passage code and typed text','error');return;}
  const r=await api('/admin/evaluate/run',{passage_code:code,typed_text:text});
  if(r.status!=='ok'){showToast(r.message||'Failed','error');return;}
  const res=r.result;
  const scores=[
    ['Full',res.full,'#dc2626'],['Half',res.half,'#d97706'],['Omit',res.omission,''],
    ['Extra',res.extra,''],['Cap',res.capitalization,''],['F.Stop',res.fullstop,''],
    ['Total',res.total_errors,'var(--gold)'],['Error%',res.error_percent+'%','var(--gold)'],
  ];
  document.getElementById('scoreGrid').innerHTML=scores.map(s=>`
    <div style="background:var(--surf2);border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">${s[0]}</div>
      <div style="font-family:'DM Serif Display',serif;font-size:22px;color:${s[2]||'var(--text)'};margin-top:3px">${s[1]}</div>
    </div>`).join('');
  document.getElementById('evalHighlight').innerHTML=r.highlighted||'';
  document.getElementById('evalResult').style.display='block';
}
</script>
{% endblock %}
