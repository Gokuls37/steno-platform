<!DOCTYPE html>
<html>
<head>
<title>Typing Test</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
margin:0;
padding:0;
}

.container{
width:900px;
margin:40px auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.timer{
font-size:20px;
font-weight:bold;
color:#e63946;
}

.topic{
font-size:22px;
font-weight:bold;
}

.typing-box{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:300px;
font-size:18px;
padding:15px;
border:1px solid #ccc;
border-radius:5px;
resize:none;
outline:none;
}

.controls{
margin-top:20px;
text-align:right;
}

button{
background:#2d5be3;
color:white;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1f46b5;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="topic">Skill Test Transcription</div>
<div class="timer" id="timer">10:00</div>
</div>

<div class="typing-box">

<textarea placeholder="Start typing your transcription here..."></textarea>

<div class="controls">
<button>Submit</button>
</div>

</div>

</div>
<script>

let time = 600;
let timerStarted = false;

function startTimer(){

    if(timerStarted) return;

    timerStarted = true;

    let countdown = setInterval(function(){

        let minutes = Math.floor(time / 60);
        let seconds = time % 60;

        if(seconds < 10){
            seconds = "0" + seconds;
        }

        document.getElementById("timer").innerText =
            minutes + ":" + seconds;

        time--;

        if(time < 0){
            clearInterval(countdown);
            alert("Time Over");
        }

    },1000);

}

document.querySelector("textarea").addEventListener("keydown", startTimer);

</script>
<script>

document.querySelector("textarea").addEventListener("paste", function(e) {
    e.preventDefault();
});

document.querySelector("textarea").addEventListener("copy", function(e) {
    e.preventDefault();
});

document.querySelector("textarea").addEventListener("cut", function(e) {
    e.preventDefault();
});

</script>
<script>

document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});

</script>

</body>
</html>
