<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ passage.title }} — DT-STENO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#080c1a;--navy2:#0f1526;--navy3:#182038;
  --gold:#f0a500;--gold3:rgba(240,165,0,.12);--gold4:rgba(240,165,0,.2);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --line:rgba(255,255,255,.08);--pass:#4ade80;--fail:#f87171;
}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;background:var(--navy2);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-title{font-family:'DM Serif Display',serif;font-size:17px}
.tb-cat{padding:3px 10px;border-radius:999px;background:var(--gold3);border:1px solid var(--gold4);font-size:11px;font-weight:600;color:var(--gold)}
.tb-timer{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--gold)}

.test-area{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:0;max-height:calc(100vh - 56px)}
.panel{padding:28px 32px;overflow-y:auto}
.panel-l{border-right:1px solid var(--line)}
.panel-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.passage-text{font-family:'JetBrains Mono',monospace;font-size:14px;line-height:2.1;color:var(--text2);border-left:2px solid var(--gold4);padding-left:16px}
{% if passage.audio_url %}
.audio-bar{background:var(--navy3);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.audio-bar audio{flex:1;height:32px}
{% endif %}

textarea{width:100%;height:calc(100vh - 160px);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:14px;line-height:2;color:var(--text);resize:none;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--gold)}

.submit-row{display:flex;align-items:center;gap:12px;margin-top:14px}
.btn{padding:11px 24px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .2s}
.btn-gold{background:var(--gold);color:#080c1a}
.btn-gold:hover{background:#f5be3d;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--line)}
.btn-ghost:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.word-count{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* Result overlay */
.result-overlay{display:none;position:fixed;inset:0;background:rgba(8,12,26,.92);z-index:200;align-items:center;justify-content:center}
.result-overlay.show{display:flex}
.result-card{background:var(--navy2);border:1px solid var(--line);border-radius:20px;padding:36px;max-width:520px;width:90%;text-align:center}
.result-verdict{font-family:'DM Serif Display',serif;font-size:42px;margin-bottom:6px}
.result-err{font-size:15px;color:var(--text2);margin-bottom:24px}
.result-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px}
.rg-item{background:var(--navy3);border:1px solid var(--line);border-radius:9px;padding:12px 8px}
.rg-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.rg-val{font-family:'DM Serif Display',serif;font-size:22px}
.result-annotation{text-align:left;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:2;background:var(--navy3);border-radius:10px;padding:14px 16px;max-height:200px;overflow-y:auto;margin-bottom:22px;border:1px solid var(--line)}
.e-full{background:rgba(248,113,113,.2);border-radius:3px;padding:0 3px;color:#fca5a5}
.e-half{background:rgba(251,146,60,.2);border-radius:3px;padding:0 3px;color:#fdba74}
.e-extra{background:rgba(192,132,252,.2);border-radius:3px;padding:0 3px;color:#d8b4fe}
.e-omit{background:rgba(96,165,250,.2);border-radius:3px;padding:0 3px;color:#93c5fd}
.spin{width:18px;height:18px;border:2px solid rgba(8,12,26,.2);border-top-color:#080c1a;border-radius:50%;animation:sp .65s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="tb-left">
    <a href="/student/dashboard" style="font-size:13px;color:var(--text3)">← Dashboard</a>
    <span class="tb-title">{{ passage.title }}</span>
    <span class="tb-cat">{{ passage.category }}</span>
  </div>
  <div class="tb-timer" id="timer">00:00</div>
</div>

<!-- Test area -->
<div class="test-area">
  <!-- Left: passage -->
  <div class="panel panel-l">
    <div class="panel-label">Reference Passage</div>
    {% if passage.audio_url %}
    <div class="audio-bar">
      🔊 <audio controls src="{{ passage.audio_url }}"></audio>
    </div>
    {% endif %}
    <div class="passage-text">{{ passage.content }}</div>
  </div>

  <!-- Right: typing area -->
  <div class="panel">
    <div class="panel-label">Your Transcription</div>
    <textarea id="typed" placeholder="Start typing your transcription here…" autofocus oninput="updateWC()"></textarea>
    <div class="submit-row">
      <button class="btn btn-gold" onclick="submitTest()">
        <span id="submitLabel">Submit</span>
      </button>
      <button class="btn btn-ghost" onclick="if(confirm('Clear all text?'))document.getElementById('typed').value=''">Clear</button>
      <div class="word-count" id="wc">0 words</div>
    </div>
  </div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-verdict" id="rVerdict"></div>
    <div class="result-err" id="rErr"></div>
    <div class="result-grid">
      <div class="rg-item"><div class="rg-label">Full</div><div class="rg-val" id="rFull" style="color:var(--fail)"></div></div>
      <div class="rg-item"><div class="rg-label">Half</div><div class="rg-val" id="rHalf" style="color:#fb923c"></div></div>
      <div class="rg-item"><div class="rg-label">Omit</div><div class="rg-val" id="rOmit"></div></div>
      <div class="rg-item"><div class="rg-label">WPM</div><div class="rg-val" id="rWpm" style="color:var(--gold)"></div></div>
    </div>
    <div class="result-annotation" id="rAnnotation"></div>
    <button class="btn btn-gold" onclick="window.location='/student/dashboard'" style="width:100%">Back to Dashboard</button>
  </div>
</div>

<script>
const PASSAGE_ID = {{ passage.id }};
let seconds = 0;
const timerEl = document.getElementById('timer');
const interval = setInterval(()=>{
  seconds++;
  const m = String(Math.floor(seconds/60)).padStart(2,'0');
  const s = String(seconds%60).padStart(2,'0');
  timerEl.textContent = m+':'+s;
},1000);

function updateWC(){
  const w = document.getElementById('typed').value.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('wc').textContent = w+' word'+(w===1?'':'s');
}

async function submitTest(){
  const typed = document.getElementById('typed').value.trim();
  if(!typed){alert('Please type something first.');return;}
  clearInterval(interval);
  document.getElementById('submitLabel').innerHTML='<div class="spin"></div>';
  const r = await fetch('/student/submit',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({passage_id:PASSAGE_ID, typed, time_taken:seconds})
  });
  const d = await r.json();
  if(d.status==='ok'){
    const res = d.result;
    const isPass = res.verdict==='PASS';
    document.getElementById('rVerdict').textContent = isPass ? 'PASS ✓' : 'FAIL ✗';
    document.getElementById('rVerdict').style.color = isPass ? 'var(--pass)' : 'var(--fail)';
    document.getElementById('rErr').textContent = `Error: ${res.error_pct}% of ${res.total} words`;
    document.getElementById('rFull').textContent = res.full;
    document.getElementById('rHalf').textContent = res.half;
    document.getElementById('rOmit').textContent = res.omit;
    document.getElementById('rWpm').textContent  = res.wpm;
    // Simple annotation
    const orig  = `{{ passage.content | replace('\n','\\n') | replace("'", "\\'") }}`;
    const oWords = orig.split(' ');
    const tWords = typed.split(' ');
    let html = '';
    for(let i=0;i<oWords.length;i++){
      const ow = oWords[i], tw = tWords[i];
      if(!tw) html += `<span class="e-omit">[${ow}]</span> `;
      else if(tw.toLowerCase()===ow.toLowerCase() && tw!==ow) html += `<span class="e-half">${tw}</span> `;
      else if(tw.toLowerCase()!==ow.toLowerCase()) html += `<span class="e-full">${tw}</span> `;
      else html += ow+' ';
    }
    for(let i=oWords.length;i<tWords.length;i++) html += `<span class="e-extra">{+${tWords[i]}}</span> `;
    document.getElementById('rAnnotation').innerHTML = html;
    document.getElementById('resultOverlay').classList.add('show');
  } else {
    alert(d.message||'Error submitting. Try again.');
    document.getElementById('submitLabel').textContent='Submit';
  }
}
</script>
</body>
</html>
