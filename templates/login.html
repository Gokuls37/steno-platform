<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — DT-STENO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c1a;--surface:#0f1526;--line:rgba(255,255,255,.08);--gold:#f0a500;--gold2:#f5be3d;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--fail:#f87171;--pass:#4ade80}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background-image:radial-gradient(ellipse 70% 60% at 15% 50%,rgba(240,165,0,.06) 0%,transparent 55%),
  radial-gradient(ellipse 60% 70% at 85% 40%,rgba(46,93,230,.05) 0%,transparent 55%)}

.wrap{width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:54px;height:54px;border-radius:14px;background:var(--gold);display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:#080c1a;margin-bottom:14px}
.logo-name{display:block;font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.3px}
.logo-tagline{display:block;font-size:12px;color:var(--text3);letter-spacing:.5px;margin-top:3px;text-transform:uppercase}

.card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:32px;box-shadow:0 28px 80px rgba(0,0,0,.6)}
.card-heading{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:5px}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:26px;line-height:1.55}

.form-label{display:block;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.input-row{position:relative;margin-bottom:16px}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);display:flex}
.input-icon svg{width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:1.8}
.inp{width:100%;padding:12px 14px 12px 40px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,165,0,.1)}
.inp::placeholder{color:var(--text3)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);display:flex;padding:4px;transition:color .2s}
.pw-toggle:hover{color:var(--text2)}
.pw-toggle svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}

.alert{display:none;align-items:center;gap:9px;padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:16px;line-height:1.4}
.alert.error{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--fail)}
.alert.success{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--pass)}
.alert.show{display:flex}
.alert svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}

.btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:600;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.btn-gold{background:var(--gold);color:#080c1a}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-gold:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--line);margin-top:10px}
.btn-outline:hover{border-color:rgba(255,255,255,.2);color:var(--text)}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0 4px}
.div-line{flex:1;height:1px;background:var(--line)}
.div-txt{font-size:12px;color:var(--text3)}

.bottom{text-align:center;margin-top:18px;font-size:13px;color:var(--text3)}
.bottom a{color:var(--gold);text-decoration:none}
.bottom a:hover{text-decoration:underline}

.spinner{width:17px;height:17px;border:2px solid rgba(8,12,26,.2);border-top-color:#080c1a;border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">DT</div>
    <span class="logo-name">DT-STENO</span>
    <span class="logo-tagline">Stenography Institute</span>
  </div>

  <div class="card">
    <div class="card-heading">Sign in</div>
    <div class="card-sub">Enter your mobile number and password to continue</div>

    <div class="alert error" id="errBox">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errMsg">Invalid credentials</span>
    </div>
    {% if error %}<div class="alert error show"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg><span>{{ error }}</span></div>{% endif %}

    <form id="loginForm">
      <div>
        <label class="form-label">Mobile Number</label>
        <div class="input-row">
          <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></span>
          <input class="inp" type="tel" id="mobile" placeholder="10-digit mobile number" required autocomplete="tel">
        </div>
      </div>
      <div>
        <label class="form-label">Password</label>
        <div class="input-row">
          <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input class="inp" type="password" id="password" placeholder="Your password" required autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw()">
            <svg id="pwIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn btn-gold" type="submit" id="submitBtn">
        <span id="btnLabel">Sign In</span>
      </button>
    </form>

    <div class="divider"><div class="div-line"></div><span class="div-txt">New to DT-STENO?</span><div class="div-line"></div></div>
    <a class="btn btn-outline" href="/register">Register with class code</a>
  </div>

  <div class="bottom">Admin? <a href="/admin/login">Go to admin panel →</a></div>
</div>
<script>
function togglePw(){
  const i=document.getElementById('password');
  const ic=document.getElementById('pwIcon');
  if(i.type==='password'){i.type='text';ic.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';}
  else{i.type='password';ic.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}
}
document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('submitBtn');
  const lbl=document.getElementById('btnLabel');
  const err=document.getElementById('errBox');
  btn.disabled=true; lbl.innerHTML='<div class="spinner"></div>'; err.classList.remove('show');
  try{
    const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({identifier:document.getElementById('mobile').value.trim(),password:document.getElementById('password').value})});
    const d=await r.json();
    if(d.status==='ok'){window.location.href=d.redirect||'/student/dashboard';}
    else{document.getElementById('errMsg').textContent=d.message||'Login failed';err.classList.add('show');btn.disabled=false;lbl.textContent='Sign In';}
  }catch{document.getElementById('errMsg').textContent='Connection error. Try again.';err.classList.add('show');btn.disabled=false;lbl.textContent='Sign In';}
});
</script>
</body>
</html>
